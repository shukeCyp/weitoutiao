name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  # ── macOS → .app + .dmg ──────────────────────────────────────────────────
  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      # 浏览器安装到 workspace 内的固定目录，打包时 spec 会读取此路径
      - name: Install Playwright Chromium
        run: uv run playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright_browsers

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build macOS .app bundle
        run: uv run pyinstaller weitoutiao.spec --noconfirm
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/playwright_browsers

      # macOS 上 Chromium 二进制文件需要有可执行权限
      - name: Fix Chromium executable permissions (macOS)
        run: |
          find dist/weitoutiao/ms-playwright -type f \( \
            -name "Chromium" -o \
            -name "chromium" -o \
            -name "chrome" -o \
            -name "*.so" -o \
            -name "*.dylib" \
          \) -exec chmod +x {} \;
        continue-on-error: true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package into DMG
        run: |
          create-dmg \
            --volname "微头条爬虫" \
            --window-pos 200 120 \
            --window-size 800 450 \
            --icon-size 100 \
            --app-drop-link 600 185 \
            "dist/weitoutiao.dmg" \
            "dist/weitoutiao.app"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: weitoutiao-macos-dmg
          path: dist/weitoutiao.dmg
          if-no-files-found: error

  # ── Windows → single-file .exe ───────────────────────────────────────────
  build-windows:
    name: Build Windows (EXE)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Python dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      # 浏览器安装到 workspace 内的固定目录，打包时 spec 会读取此路径
      - name: Install Playwright Chromium
        run: uv run playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\playwright_browsers

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Windows .exe
        run: uv run pyinstaller weitoutiao.spec --noconfirm
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\playwright_browsers

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: weitoutiao-windows-exe
          path: dist/weitoutiao.exe
          if-no-files-found: error

  # ── Release：仅在推送版本 tag 时创建 GitHub Release ──────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: weitoutiao-macos-dmg
          path: artifacts

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: weitoutiao-windows-exe
          path: artifacts

      - name: Rename artifacts with version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv artifacts/weitoutiao.dmg  artifacts/weitoutiao-${VERSION}-macos.dmg
          mv artifacts/weitoutiao.exe  artifacts/weitoutiao-${VERSION}-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "微头条爬虫 ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/weitoutiao-${{ github.ref_name }}-macos.dmg
            artifacts/weitoutiao-${{ github.ref_name }}-windows.exe
