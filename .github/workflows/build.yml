name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS → .dmg ─────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build .app with PyInstaller
        run: uv run pyinstaller weitoutiao.spec --noconfirm

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package as .dmg
        run: |
          create-dmg \
            --volname "微头条爬虫" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --app-drop-link 450 180 \
            "dist/weitoutiao.dmg" \
            "dist/weitoutiao.app"

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: weitoutiao-macos
          path: dist/weitoutiao.dmg

  # ── Windows → .exe ───────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build .exe with PyInstaller
        run: uv run pyinstaller weitoutiao.spec --noconfirm

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: weitoutiao-windows
          path: dist/weitoutiao.exe

  # ── Create GitHub Release ─────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: weitoutiao-macos
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: weitoutiao-windows
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/weitoutiao.dmg
            artifacts/weitoutiao.exe
          generate_release_notes: true
